<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
    <h1> UNORDERED LIST </h1>
  <ul>
    <li><h2> Stationary items :</h2></li>
    <li> notebook </li>
    <li> pencil </li>
    <li>eraser</li>
    <li>sharpener</li>
  </ul>  


    <h1>ORDERED LIST </h1>
  <ol>
    <li> notebook </li>
    <li> pencil </li>
    <li>eraser</li>
    <li>sharpener</li>
  </ol>
  </body>
</html>
